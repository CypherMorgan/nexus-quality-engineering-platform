<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body>

<form action="/dashboard">

    <input
        data-testid="username"
        name="username"
    />

    <input
        data-testid="password"
        name="password"
        type="password"
    />

    <button
        data-testid="login-button"
        type="submit"
    >
        Login
    </button>

</form>

</body>
</html>
