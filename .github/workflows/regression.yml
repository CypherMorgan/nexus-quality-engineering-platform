name: Regression

on:

  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

jobs:

  regression:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: playwright install

      - run: |
          pytest \
          -m regression