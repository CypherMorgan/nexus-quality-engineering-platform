version: "3.9"

services:

  mock-app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

  automation:
    build: .

    depends_on:
      - mock-app

    volumes:
      - ./allure-results:/app/allure-results
      - ./reports:/app/reports

    command: >
      pytest
      -m smoke